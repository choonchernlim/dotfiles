# Starship prompt, styled after the previous powerlevel10k rainbow setup:
# two-line prompt with box-drawing connectors; left = os icon / dir / git as
# joined powerline blocks; right = contextual segments, only shown when relevant.
#
# This file is live-symlinked (mkOutOfStoreSymlink) - edits apply on the next
# prompt, no rebuild needed. Colors are ANSI palette names/numbers so the
# terminal theme stays in charge, same as p10k rainbow did.
#
# Nerd-font glyphs are written as \u escapes (not literal chars) so they
# survive tooling that mangles non-ASCII bytes. Kept to the BMP Private Use
# Area (U+E000-U+F8FF: Font Awesome/Powerline/devicons) deliberately: herdr
# (the terminal workspace manager) re-renders each pane through its own
# libghostty-vt grid + SemanticFrame client protocol, which drops astral-
# plane codepoints (>U+FFFF, e.g. the 5-hex-digit Material Design Icons
# nerd-fonts also ships) as tofu boxes - BMP glyphs round-trip fine.

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

# Left prompt, line 1: Ôò¡ÔöÇ os ÔåÆ directory ÔåÆ git, then input on line 2 after Ôò░ÔöÇ.
# Arrows are hardcoded between segments (same tradeoff as starship's official
# rainbow presets): outside a git repo the green git block collapses to a thin
# chevron - tweak here if it bothers you.
format = """
[Ôò¡ÔöÇ](fg:242)\
[¯é░](fg:white)\
$os\
[¯é░](fg:white bg:blue)\
$directory\
[¯é░](fg:blue bg:green)\
$git_branch\
$git_status\
[¯é░](fg:green)\
$line_break\
[Ôò░ÔöÇ](fg:242)\
$character\
"""

# Right prompt: same segment order p10k showed - exit status, duration, jobs,
# then context segments that appear only when configured/active, then time.
right_format = """
$status\
$cmd_duration\
$jobs\
$kubernetes\
$terraform\
$aws\
$gcloud\
$time\
"""

[os]
disabled = false
style = "bg:white fg:black"
format = "[ $symbol ]($style)"

[os.symbols]
Macos = "´à╣"

[directory]
style = "bg:blue fg:white"
format = "[ $path ]($style)"
truncation_length = 4
truncation_symbol = "ÔÇª/"

[git_branch]
style = "bg:green fg:black"
symbol = "¯éá"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:green fg:black"
format = "[($all_status$ahead_behind )]($style)"

[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold red)"

[status]
disabled = false
symbol = "Ô£ÿ "
style = "fg:red"
format = "[$symbol$status]($style) "

[cmd_duration]
min_time = 3000
style = "fg:yellow"
format = "[´Çù $duration]($style) "

[jobs]
style = "fg:magenta"
format = "[$symbol$number]($style) "

[kubernetes]
disabled = false
style = "fg:blue"
format = "[´Öò $context( \\($namespace\\))]($style) "

[terraform]
style = "fg:105"
format = "[´å▓ $workspace]($style) "

[aws]
style = "fg:208"
format = "[´ë░ ($profile)(\\($region\\))]($style) "

[gcloud]
style = "fg:32"
format = "[´âé $project]($style) "

[time]
disabled = false
style = "fg:242"
format = "[´Çù $time]($style)"
